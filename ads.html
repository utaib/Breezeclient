<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Breeze Client Partner Offers</title>
    
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3363746666566736" crossorigin="anonymous"></script>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            width: 100%;
            height: 100vh;
            background-color: #05050a; /* Exact match to your Breeze dark theme */
            overflow: hidden; /* Prevents ugly scrollbars inside the launcher */
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .vertical_ad_container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 8px; /* Tiny spacing so the ad does not touch the exact edge */
        }
    </style>
</head>
<body>

    <div class="vertical_ad_container">
        <ins class="adsbygoogle"
             style="display:block; width:100%; height:100%;"
             data-ad-client="ca-pub-3363746666566736"
             data-ad-format="vertical"
             data-full-width-responsive="true"></ins>
        <script>
             (adsbygoogle = window.adsbygoogle || []).push({});
        </script>
    </div>

</body>
</html>
